services:
  tdarr:
    container_name: tdarr
    image: ghcr.io/haveagitgat/tdarr:latest
    restart: unless-stopped
    network_mode: bridge
    ports:
      - 8265:8265 # webUI port
      - 8266:8266 # server port
    env_file:
      - .env.tdarr
    environment:
      - TZ=${TZ:-Europe/London}
      - UMASK_SET=${UMASK_SET:-002}
      - serverIP=0.0.0.0
      - serverPort=8266
      - webUIPort=8265
      - internalNode=true
      - inContainer=true
      - ffmpegVersion=7
      - nodeName=MyInternalNode
      - auth=false
      - openBrowser=true
      - maxLogSizeMB=10
      - cronPluginUpdate=
    volumes:
      - /data/tdarr/server:/app/server
      - /data/tdarr/configs:/app/configs
      - /data/tdarr/logs:/app/logs
      - /data/media/disk1/tv:/media
      - /data/media/disk1/transcode:/temp

    devices:
      - /dev/dri:/dev/dri

    