services:
  syncthing:
    image: lscr.io/linuxserver/syncthing:latest
    container_name: syncthing
    env_file:
      - .env
    volumes:
      - /data/syncthing/config:/config
      - /data/obsidian/config/pjury:/data1
      - /data/linux-config:/data2
    ports:
      - 8384:8384
      - 22000:22000/tcp
      - 22000:22000/udp
      - 21027:21027/udp
    restart: unless-stopped
