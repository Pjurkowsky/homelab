services:
  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    ports:
      - 8090:8090
    volumes:
      - /data/beszel/beszel_data:/beszel_data
      - /data/beszel/beszel_socket:/beszel_socket

  beszel-agent:
    image: henrygd/beszel-agent-intel:latest
    cap_add:
      - CAP_PERFMON
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - /data/beszel/beszel_agent_data:/var/lib/beszel-agent
      - /data/beszel/beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /data/media/disk0:/extra-filesystems/disk0:ro
      - /data/media/disk1:/extra-filesystems/disk1:ro
    devices:
      - /dev/dri/card0:/dev/dri/card0
    env_file:
      - .env
