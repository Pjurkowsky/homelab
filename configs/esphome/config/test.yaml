esphome:
  name: test
  friendly_name: test

esp8266:
  board: esp01_1m

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: !secret fallback_ap_ssid
    password: !secret fallback_ap_password


one_wire:
  - platform: gpio
    pin: GPIO4

sensor:
  - platform: dallas_temp
    name: temperature
    
  - platform: homeassistant
    id: room_light_brightness
    entity_id: light.wiz_rgbww_tunable_a6af94
    attribute: brightness
    internal: true


binary_sensor:
  - platform: gpio
    id: button_1
    pin:
      number: GPIO5
      mode: INPUT_PULLUP
      inverted: true
    name: "Button 1"

    on_multi_click:
      - timing:
          - ON for at most 350ms
          - OFF for at least 250ms
        then:
          - homeassistant.action:
              action: light.toggle
              data:
                entity_id: light.wiz_rgbww_tunable_a6af94

      - timing:
          - ON for at most 350ms
          - OFF for at most 300ms
          - ON for at most 350ms
          - OFF for at least 250ms
        then:
          - if:
              condition:
                lambda: |-
                  return id(room_light_brightness).has_state() &&
                         id(room_light_brightness).state > 127;
              then:
                - homeassistant.action:
                    action: light.turn_on
                    data:
                      entity_id: light.wiz_rgbww_tunable_a6af94
                      brightness: "25"
              else:
                - homeassistant.action:
                    action: light.turn_on
                    data:
                      entity_id: light.wiz_rgbww_tunable_a6af94
                      brightness: "255"

captive_portal:
    