name: Robot vacuum
products:
  - id: 5309qt4sjd4uz4qz
    manufacturer: ILIFE
    model: A30 Pro

entities:
  - entity: vacuum
    dps:
      - id: 1
        type: boolean
        name: activate
        optional: true
        mapping:
          - dps_val: false
            constraint: pause
            conditions:
              - dps_val: true
                value: false
              - dps_val: false
                value: false
                hidden: true
              - dps_val: null
                value: false
                hidden: true
          - dps_val: true
            constraint: pause
            conditions:
              - dps_val: false
                value: true
              - dps_val: true
                value: true
                hidden: true
              - dps_val: null
                value: true
                hidden: true
          - dps_val: null
            value: false
            hidden: true

      - id: 2
        type: boolean
        optional: true
        name: pause
        hidden: true

      - id: 4
        type: string
        name: command
        mapping:
          - dps_val: smart
            value: smart
          - dps_val: chargego
            value: return_to_base
          - dps_val: zone
            value: zone
          - dps_val: pose
            value: clean_spot
          - dps_val: part
            value: partial
          - dps_val: edge
            value: edge
          - dps_val: explore
            value: explore
          - dps_val: exploreclean
            value: exploreclean
          - dps_val: select_room
            value: select_room

      - id: 5
        type: string
        name: status
        mapping:
          - dps_val: standby
            value: standby
          - dps_val: smart
            value: smart
          - dps_val: zone_clean
            value: zone
          - dps_val: part_clean
            value: partial
          - dps_val: cleaning
            value: cleaning
          - dps_val: paused
            value: paused
          - dps_val: goto_pos
            value: seeking_spot
          - dps_val: pos_arrived
            value: located_spot
          - dps_val: pos_unarrive
            value: left_spot
          - dps_val: goto_charge
            value: returning
          - dps_val: charging
            value: charging
          - dps_val: charge_done
            value: charged
          - dps_val: sleep
            value: sleep
          - dps_val: edge
            value: edge
          - dps_val: explore
            value: explore
          - dps_val: explore_clean
            value: explore_clean
          - dps_val: base_charging
            value: charging
          - dps_val: adapter_charging
            value: charging
          - dps_val: base_sleeping
            value: docked
          - dps_val: adapter_sleeping
            value: sleep
          - dps_val: continuation_charging
            value: charging
          - dps_val: in_positioning
            value: in_positioning

      - id: 9
        type: string
        name: fan_speed
        mapping:
          - dps_val: closed
            value: "Off"
          - dps_val: gentle
            value: Low
          - dps_val: normal
            value: Medium
          - dps_val: strong
            value: High
          - dps_val: max
            value: Max

      - id: 11
        type: boolean
        name: locate
        optional: true

      - id: 12
        type: string
        name: direction_control
        mapping:
          - dps_val: forward
            value: forward
          - dps_val: backward
            value: backward
          - dps_val: turn_left
            value: left
          - dps_val: turn_right
            value: right
          - dps_val: stop
            value: stop

      - id: 14
        type: string
        optional: true
        name: path_data

      - id: 15
        type: string
        optional: true
        name: command_trans

      - id: 28
        type: bitfield
        name: error
        hidden: true

      - id: 32
        type: string
        optional: true
        name: device_timer

      - id: 33
        type: string
        optional: true
        name: disturb_time_set

      - id: 34
        type: string
        optional: true
        name: device_info

      - id: 35
        type: string
        optional: true
        name: voice_data

  - entity: select
    name: Raw cleaning mode
    category: config
    dps:
      - id: 4
        type: string
        name: option
        mapping:
          - dps_val: smart
            value: smart
          - dps_val: chargego
